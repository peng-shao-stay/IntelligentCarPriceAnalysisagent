# ============================================
# AutoMind AI - Docker Compose
# ============================================

services:
  # ==========================================
  # PostgreSQL 16 + pgvector
  # ==========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: automind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-automind}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-automind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis 7
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: automind-redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================
  # FastAPI 后端
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: automind-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # --- 数据库 & 缓存 ---
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-automind}
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_TTL: ${REDIS_CACHE_TTL:-3600}

      # --- API 密钥 ---
      API_KEY: ${API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}

      # --- LLM 配置 ---
      DEEPSEEK_API_BASE_URL: ${DEEPSEEK_API_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-primary}
      TEMPERATURE: ${TEMPERATURE:-0.7}
      MAX_TOKENS: ${MAX_TOKENS:-2000}

      # --- Ollama（可选）---
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}

      # --- 应用设置 ---
      APP_NAME: ${APP_NAME:-AutoMind AI}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-automind-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["*"]}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      API_V1_PREFIX: /api/v1
    ports:
      - "${BACKEND_EXTERNAL_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ==========================================
  # Nginx + React 前端
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: automind-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-80}:80"

volumes:
  pgdata:
  redisdata:
